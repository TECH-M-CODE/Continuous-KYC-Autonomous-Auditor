services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data
    environment:
      - DATABASE_URL=sqlite:///./data/sentinelai.db
      - ENVIRONMENT=development
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelai_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
